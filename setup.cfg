[flake8]
max-line-length = 100
exclude = 
    .git,
    __pycache__,
    */__pycache__/*,
    build,
    dist,
    venv,
    .venv,
    htmlcov,
    .eggs,
    *.egg-info,
    tests/,
    scripts/,
ignore = E203,W503,F541,E402,F403,F405,W293,F811,F824,F841,E501,E741,E128,E306,E704,E305,W504,W291,W292,E302,E226,F401

[mypy]
python_version = 3.11
ignore_missing_imports = False

[mypy-pkg_resources.*]
ignore_missing_imports = True