# Example pre-commit configuration for DBLift SQL validation
# Copy this to .pre-commit-config.yaml and run: pre-commit install

repos:
  - repo: local
    hooks:
      # Validate SQL files before commit
      - id: validate-sql
        name: Validate SQL migrations
        entry: dblift validate-sql
        args:
          - --dialect=postgresql
          - --rules-file=.dblift_rules.yaml
          - --format=compact
          - --severity-threshold=warning
        language: system
        types: [sql]
        pass_filenames: true
        # Only check files in migrations directory
        files: ^migrations/.*\.sql$

      # Performance analysis only (no business rules)
      - id: validate-sql-performance
        name: Check SQL performance issues
        entry: dblift validate-sql
        args:
          - --dialect=postgresql
          - --format=compact
          - --no-performance=false
          - --severity-threshold=error
        language: system
        types: [sql]
        pass_filenames: true
        files: ^migrations/.*\.sql$
        # This hook only fails on errors, warnings are allowed
        verbose: true

# Alternative: Use pre-commit's built-in language support
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [yaml, json]
        files: \.dblift_rules\.yaml$

# You can also run validation in CI/CD only by commenting out local hooks
# and using the GitHub Action or GitLab CI examples instead
