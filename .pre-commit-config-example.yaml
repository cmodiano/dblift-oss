# Example pre-commit config for dblift (OSS).
# Copy to .pre-commit-config.yaml and run: pre-commit install
#
# These hooks require a configured dblift.yaml (or DBLIFT_DB_URL) and a reachable
# database (e.g. your local docker-compose DB). dblift has no offline lint in OSS.
# SQL linting (`validate-sql`) requires dblift-enterprise.

repos:
  - repo: https://github.com/cmodiano/dblift-oss
    rev: v1.8.0   # pin to a released tag
    hooks:
      - id: dblift-validate
      - id: dblift-info