version: '3.8'

services:
  # Full DBLift image with database connectivity
  dblift:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./migrations:/workspace/migrations
      - ./dblift.yaml:/workspace/dblift.yaml
    environment:
      - DBLIFT_DB_URL=${DBLIFT_DB_URL}
      - DBLIFT_DB_USERNAME=${DBLIFT_DB_USERNAME}
      - DBLIFT_DB_PASSWORD=${DBLIFT_DB_PASSWORD}
      - DBLIFT_DB_SCHEMA=${DBLIFT_DB_SCHEMA}
    command: ["info"]

  # Example: PostgreSQL database for testing
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dblift_user
      POSTGRES_PASSWORD: dblift_pass
      POSTGRES_DB: dblift_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
