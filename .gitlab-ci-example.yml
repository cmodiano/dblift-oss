# Example GitLab CI for dblift (OSS). Copy to .gitlab-ci.yml and adjust.
# Uses OSS commands only: `validate` (checksums/order/applied-state) and `info`.
# `validate-sql`, `drift`, and `plan` require dblift-enterprise.

stages: [validate]

validate-migrations:
  stage: validate
  image: python:3.11
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_USER: dblift
    POSTGRES_PASSWORD: dblift
    POSTGRES_DB: dblift
    DBLIFT_DB_URL: "postgresql+psycopg://dblift:dblift@postgres:5432/dblift"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [migrations/**/*]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [migrations/**/*]
  script:
    - pip install "dblift[postgresql]"
    - dblift migrate
    - dblift validate
    - dblift info