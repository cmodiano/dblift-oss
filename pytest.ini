[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    sqlserver: tests requiring SQL Server
    oracle: tests requiring Oracle
    db2: tests requiring DB2
    postgresql: tests requiring PostgreSQL
    migration: tests for migration functionality
    no_auto_setup: marks tests to skip automatic database setup and cleanup
    no_cleanup: marks tests to skip automatic database cleanup
    no_db: marks tests that don't require a database connection at all
    asyncio: mark test as asyncio
    cli: marks tests related to CLI functionality
    mysql: tests requiring MySQL
    sqlite: tests requiring SQLite
    cosmosdb: tests requiring CosmosDB

# Log configuration
# log_cli is OFF by default — streaming every INFO log real-time was adding
# 2-3x overhead on local runs. Captured logs are still shown on failure via
# pytest's default capture. Enable explicitly with `-o log_cli=true` when
# debugging a specific test.
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Disable warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ImportWarning
    ignore::ResourceWarning

# Default addopts kept minimal for fast local runs.
# --strict-markers            : unknown @pytest.mark.foo fails loudly.
# --import-mode=importlib     : prevents import cache conflicts when test files share names.
# Coverage is NOT in the default — CI adds `--cov` explicitly (see
# .github/workflows/unit-tests.yml). Enable locally with `--cov` when needed.
# Verbose output is NOT in the default — pass `-v` on the CLI for verbose runs.
addopts = --strict-markers --import-mode=importlib

# Test output settings
console_output_style = progress

