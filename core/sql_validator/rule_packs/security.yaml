# =============================================================================
# DBLift Security Validation Rule Pack
# 
# Rules to prevent SQL injection, protect sensitive data, and enforce
# security best practices in database migrations and queries.
# =============================================================================

rules:
  # ---------------------------------------------------------------------------
  # SQL Injection Prevention
  # ---------------------------------------------------------------------------

  - name: no_string_concatenation_in_sql
    type: pattern
    regex: "(?i)(\\+|CONCAT|\\|\\|).*SELECT|SELECT.*(\\+|CONCAT|\\|\\|)"
    message: "String concatenation in SQL queries can lead to SQL injection - use parameterized queries"
    severity: error
    suggestion: "Use parameterized queries or prepared statements instead of string concatenation"

  - name: no_dynamic_sql_without_validation
    type: pattern
    regex: "(?i)EXECUTE\\s+IMMEDIATE|EXEC\\s*\\(|sp_executesql"
    message: "Dynamic SQL execution should be avoided or properly validated"
    severity: error
    suggestion: "Use static SQL or ensure dynamic SQL is properly sanitized and validated"
    rationale: "Dynamic SQL can bypass static review and introduce injection or privilege escalation risk."
    remediation: "Use parameterized execution and document the allowed statement shape."
    control_mapping:
      - "SOC2-CC7.1"
      - "ISO27001-A.14.2.5"
    override_policy:
      requires:
        - owner
        - reason
        - ticket
        - expires_at
      max_days: 30

  - name: no_user_input_in_sql
    type: pattern
    regex: "(?i)(SELECT|INSERT|UPDATE|DELETE).*\\$\\{|\\$\\{.*\\}"
    message: "User input placeholders in SQL should be properly parameterized"
    severity: warning
    suggestion: "Use parameterized queries: SELECT * FROM users WHERE id = ?"

  # ---------------------------------------------------------------------------
  # Sensitive Data Protection
  # ---------------------------------------------------------------------------

  - name: password_columns_must_be_encrypted
    type: pattern
    regex: "(?i)(password|pwd|passwd)\\s+(VARCHAR|CHAR|TEXT|VARCHAR2)"
    message: "Password columns should use encrypted/hashed storage, not plain text"
    severity: error
    suggestion: "Use appropriate encryption/hashing: password_hash VARCHAR(255) with bcrypt/argon2"

  - name: sensitive_data_should_not_be_logged
    type: pattern
    regex: "(?i)(password|ssn|credit_card|card_number|pin|secret).*(SELECT|INSERT)"
    message: "Sensitive data (passwords, SSN, credit cards) should not be logged or exposed"
    severity: warning
    suggestion: "Ensure sensitive columns are excluded from logs and error messages"

  - name: no_plaintext_storage_of_secrets
    type: pattern
    regex: "(?i)(api_key|secret_key|token|credential).*(VARCHAR|CHAR|TEXT)"
    message: "Secrets (API keys, tokens) should be encrypted, not stored in plaintext"
    severity: error
    suggestion: "Use encryption at rest or secure secret management systems"

  # ---------------------------------------------------------------------------
  # Access Control Patterns
  # ---------------------------------------------------------------------------

  - name: no_grant_all_privileges
    type: pattern
    regex: "(?i)GRANT\\s+ALL\\s+PRIVILEGES"
    message: "GRANT ALL PRIVILEGES is too permissive - grant specific privileges instead"
    severity: error
    suggestion: "Grant specific privileges: GRANT SELECT, INSERT ON table TO user"
    rationale: "Broad privilege grants bypass least-privilege controls and make production access harder to audit."
    remediation: "Grant only the specific privileges required by the application role."
    control_mapping:
      - "SOC2-CC6.3"
      - "ISO27001-A.9.2.3"
    override_policy:
      requires:
        - owner
        - reason
        - ticket
        - expires_at
      max_days: 30

  - name: no_public_schema_access
    type: pattern
    regex: "(?i)GRANT.*TO\\s+PUBLIC"
    message: "Avoid granting privileges to PUBLIC role - grant to specific users/roles"
    severity: warning
    suggestion: "Create specific roles and grant to those roles instead"

  - name: require_explicit_permissions
    type: pattern
    regex: "(?i)(CREATE|ALTER|DROP).*(?!WITH\\s+(GRANT|PERMISSION))"
    message: "Schema changes should explicitly specify permission requirements"
    severity: info

  # ---------------------------------------------------------------------------
  # Data Exposure Prevention
  # ---------------------------------------------------------------------------

  - name: no_select_without_where_on_sensitive_tables
    type: pattern
    regex: "(?i)SELECT.*FROM\\s+(users|accounts|customers|payments)(?!.*WHERE)"
    message: "Queries on sensitive tables (users, accounts) should have WHERE clauses to limit exposure"
    severity: warning
    suggestion: "Add WHERE clause to limit result set: WHERE id = ? or WHERE status = 'active'"

  - name: no_full_table_scans_on_large_tables
    type: pattern
    regex: "(?i)SELECT.*FROM\\s+(logs|events|audit|history)(?!.*WHERE|.*LIMIT)"
    message: "Queries on large tables (logs, events) should have WHERE clauses or LIMIT"
    severity: warning

  - name: require_row_level_security
    type: pattern
    regex: "(?i)(CREATE|ALTER)\\s+TABLE.*(users|accounts|customers)(?!.*POLICY|.*RLS)"
    message: "Sensitive tables should consider Row Level Security (RLS) policies"
    severity: info
    suggestion: "Enable RLS: ALTER TABLE users ENABLE ROW LEVEL SECURITY"

  # ---------------------------------------------------------------------------
  # Authentication and Authorization
  # ---------------------------------------------------------------------------

  - name: no_hardcoded_credentials
    type: pattern
    regex: "(?i)(password|pwd|passwd)\\s*=\\s*['\"][^'\"]+['\"]"
    message: "Hardcoded passwords/credentials should never appear in migration scripts"
    severity: error
    suggestion: "Use environment variables or secure credential management"

  - name: no_default_passwords
    type: pattern
    regex: "(?i)DEFAULT\\s+.*(password|pwd|passwd).*['\"](admin|password|1234|default)"
    message: "Default passwords are security risks - require password changes"
    severity: error

  # ---------------------------------------------------------------------------
  # Audit and Compliance
  # ---------------------------------------------------------------------------

  - name: require_audit_trail_for_sensitive_operations
    type: pattern
    regex: "(?i)(DELETE|UPDATE|DROP).*(users|accounts|payments|transactions)(?!.*audit|.*log)"
    message: "Sensitive operations (DELETE/UPDATE on users, accounts) should be audited"
    severity: warning
    suggestion: "Create audit triggers or use audit logging for sensitive operations"

  - name: require_soft_delete_for_important_data
    type: pattern
    regex: "(?i)DELETE\\s+FROM\\s+(users|accounts|customers)(?!.*deleted_at)"
    message: "Important data should use soft deletes (deleted_at column) instead of hard deletes"
    severity: warning
    suggestion: "Add deleted_at column and use UPDATE ... SET deleted_at = NOW() instead of DELETE"

  # ---------------------------------------------------------------------------
  # Input Validation
  # ---------------------------------------------------------------------------

  - name: require_check_constraints_for_enums
    type: pattern
    regex: "(?i)(status|type|state|role).*(VARCHAR|CHAR)(?!.*CHECK)"
    message: "Enum-like columns (status, type) should have CHECK constraints for validation"
    severity: warning
    suggestion: "Add CHECK constraint: CHECK (status IN ('active', 'inactive', 'pending'))"

  - name: require_length_limits_on_text_fields
    type: pattern
    regex: "(?i)(email|username|name|title).*(VARCHAR|CHAR)(?!\\(\\d+\\))"
    message: "Text fields should have length limits to prevent DoS attacks"
    severity: warning
    suggestion: "Specify length: VARCHAR(255) or VARCHAR(100)"

  - name: require_validation_on_email_columns
    type: pattern
    regex: "(?i)email\\s+(VARCHAR|CHAR|TEXT)(?!.*CHECK.*@)"
    message: "Email columns should have validation (CHECK constraint or proper format validation)"
    severity: info
    suggestion: "Add CHECK constraint: CHECK (email ~* '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}$')"

  # ---------------------------------------------------------------------------
  # Encryption and Hashing
  # ---------------------------------------------------------------------------

  - name: require_encryption_for_pii
    type: pattern
    regex: "(?i)(ssn|social_security|credit_card|card_number|phone|email).*(VARCHAR|CHAR|TEXT)(?!.*encrypt|.*hash)"
    message: "PII (SSN, credit cards, phone) should be encrypted at rest"
    severity: warning
    suggestion: "Use encryption functions or encrypted column types"

  - name: require_salt_for_password_hashes
    type: pattern
    regex: "(?i)password.*hash(?!.*salt)"
    message: "Password hashing should include salt for security"
    severity: warning
    suggestion: "Use bcrypt, argon2, or scrypt which include salt automatically"
