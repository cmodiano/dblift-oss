# =============================================================================
# DBLift Rule Selection Configuration
# 
# This file demonstrates how to declaratively select rules from rule packs.
# You can combine rule packs, individual rules, and custom rules.
# =============================================================================

# Rule packs to include (loads all rules from these packs)
rule_packs:
  - performance
  - security
  # - naming
  # - best_practices

# Individual rules to include (by name, from any pack)
rules:
  - fk_must_have_index
  - no_select_star
  # - table_name_snake_case
  # - require_primary_key

# Rules to exclude (removes these rules even if included via packs)
exclude_rules:
  # - some_rule_to_disable
  # - another_rule_to_disable

# Custom rules to add (define your own rules)
custom_rules:
  # - name: my_custom_rule
  #   type: pattern
  #   prohibit: "DROP DATABASE"
  #   message: "DROP DATABASE is not allowed"
  #   severity: error
  #   suggestion: "Use a different approach"
