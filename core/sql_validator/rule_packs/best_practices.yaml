# =============================================================================
# DBLift Best Practices Rule Pack
# 
# Common SQL best practices for database migrations and schema design.
# These rules promote maintainability, consistency, and data integrity.
# 
# Note: For naming conventions, see the naming.yaml rule pack.
# =============================================================================

rules:
  # ---------------------------------------------------------------------------
  # Table Structure Best Practices
  # ---------------------------------------------------------------------------

  - name: require_primary_key
    type: presence
    target: table
    must_have_primary_key: true
    message: "All tables should have a primary key for data integrity"
    severity: error
    exceptions:
      - table_matches: ".*_log.*"
      - table_matches: ".*_temp.*"
      - table_matches: ".*_staging.*"
      - table_matches: ".*_archive.*"

  - name: require_table_comment
    type: presence
    target: table
    must_have_comment: true
    message: "Tables should have comments describing their purpose"
    severity: info

  - name: require_column_comments_for_complex_types
    type: pattern
    regex: "(?i)(JSONB|JSON|ARRAY|UUID|TIMESTAMP|INTERVAL).*(?!COMMENT)"
    message: "Complex data types (JSONB, ARRAY, UUID) should have column comments"
    severity: info

  # ---------------------------------------------------------------------------
  # Column Best Practices
  # ---------------------------------------------------------------------------


  - name: require_not_null_on_required_fields
    type: pattern
    regex: "(?i)(email|phone|username|password).*(?!NOT\\s+NULL)"
    message: "Required fields (email, phone, username) should be NOT NULL"
    severity: warning

  - name: require_default_for_not_null
    type: pattern
    regex: "(?i)NOT\\s+NULL(?!.*DEFAULT)"
    message: "NOT NULL columns should have DEFAULT values when appropriate"
    severity: info

  # ---------------------------------------------------------------------------
  # Audit Column Best Practices
  # ---------------------------------------------------------------------------

  - name: require_audit_timestamps
    type: presence
    target: table
    must_have_columns: ["created_at", "updated_at"]
    message: "Tables should have audit timestamp columns (created_at, updated_at)"
    severity: warning
    exceptions:
      - table_matches: ".*_log.*"
      - table_matches: ".*_temp.*"
      - table_matches: ".*_staging.*"
      - table_matches: ".*_ref.*"
      - table_matches: ".*_lookup.*"

  - name: audit_timestamps_should_be_timestamp
    type: pattern
    regex: "(?i)(created_at|updated_at)\\s+(?!TIMESTAMP)"
    message: "Audit timestamp columns should use TIMESTAMP data type"
    severity: info

  # ---------------------------------------------------------------------------
  # Foreign Key Best Practices
  # ---------------------------------------------------------------------------

  - name: fk_must_have_index
    type: relational
    target: foreign_key
    requires_index: true
    message: "Foreign keys should have indexes for join performance"
    severity: warning

  - name: fk_must_specify_cascade
    type: pattern
    regex: "(?i)FOREIGN\\s+KEY.*(?!ON\\s+(DELETE|UPDATE))"
    message: "Foreign keys should specify ON DELETE/UPDATE behavior"
    severity: warning
    suggestion: "Add ON DELETE CASCADE, RESTRICT, SET NULL, or NO ACTION as appropriate"

  # ---------------------------------------------------------------------------
  # Index Best Practices
  # ---------------------------------------------------------------------------

  - name: unique_index_on_unique_constraints
    type: pattern
    regex: "(?i)UNIQUE.*(?!INDEX)"
    message: "UNIQUE constraints should have corresponding indexes"
    severity: info

  - name: composite_index_column_order
    type: pattern
    regex: "(?i)CREATE\\s+INDEX.*(\\w+_id,\\s*\\w+_id)"
    message: "Composite indexes should order columns by selectivity (most selective first)"
    severity: info

  # ---------------------------------------------------------------------------
  # Query Best Practices
  # ---------------------------------------------------------------------------

  - name: no_select_star
    type: pattern
    regex: "SELECT\\s+\\*"
    message: "Avoid SELECT * - explicitly list columns for better maintainability"
    severity: warning
    exceptions:
      - when: "COUNT(*)"
        policy_exempt: true
        owner: "dblift-rule-pack"
        reason: "Aggregate count expressions do not expand table columns."
      - in_views: true
        policy_exempt: true
        owner: "dblift-rule-pack"
        reason: "View definitions may intentionally expose all projected columns for compatibility."
    suggestion: "List specific columns: SELECT id, name, email FROM users"
    rationale: "SELECT * makes query behavior fragile when schemas evolve and can increase I/O unexpectedly."
    remediation: "Select only the columns required by the migration or validation query."
    control_mapping:
      - "DBLIFT-PERF-001"
    override_policy:
      requires:
        - owner
        - reason
      max_days: 90

  - name: update_delete_must_have_where
    type: pattern
    target: update
    require: "WHERE"
    message: "UPDATE/DELETE statements must have WHERE clause"
    severity: error

  - name: limit_on_large_result_sets
    type: pattern
    regex: "(?i)SELECT.*(?!LIMIT|TOP|FETCH)"
    message: "Large SELECT queries should use LIMIT/TOP/FETCH to prevent performance issues"
    severity: info
    exceptions:
      - when: "COUNT(*)"
      - when: "EXISTS"
      - in_views: true

  # ---------------------------------------------------------------------------
  # Data Type Best Practices
  # ---------------------------------------------------------------------------

  - name: use_proper_date_types
    type: pattern
    regex: "(?i)(created_at|updated_at|.*_date|.*_at)\\s+(VARCHAR|CHAR|TEXT)"
    message: "Date/timestamp columns should use DATE, TIMESTAMP, or TIMESTAMPTZ, not VARCHAR"
    severity: error

  - name: use_proper_numeric_types
    type: pattern
    regex: "(?i)(price|amount|quantity|count|.*_id)\\s+(VARCHAR|CHAR|TEXT)"
    message: "Numeric columns should use INTEGER, DECIMAL, NUMERIC, not VARCHAR"
    severity: error

  - name: avoid_text_for_short_strings
    type: pattern
    regex: "(?i)(email|phone|code|status)\\s+TEXT"
    message: "Short strings (email, phone, code) should use VARCHAR with appropriate length, not TEXT"
    severity: warning

  # ---------------------------------------------------------------------------
  # Migration Script Best Practices
  # ---------------------------------------------------------------------------

  - name: no_drop_without_backup
    type: pattern
    regex: "(?i)DROP\\s+(TABLE|COLUMN|INDEX|CONSTRAINT)\\s+(?!.*BACKUP|.*ARCHIVE)"
    message: "DROP statements should be preceded by backup/archive operations"
    severity: warning
    rationale: "Destructive DDL can remove production data or break dependent objects."
    remediation: "Use an archival migration, backup proof, or an approved drop plan."
    control_mapping:
      - "SOC2-CC7.2"
      - "ISO27001-A.12.1.2"
    override_policy:
      requires:
        - owner
        - reason
        - ticket
        - expires_at
      max_days: 14

  - name: alter_table_add_column_should_have_default
    type: pattern
    regex: "(?i)ALTER\\s+TABLE.*ADD\\s+COLUMN.*(?!DEFAULT)"
    message: "Adding NOT NULL columns to existing tables should include DEFAULT value"
    severity: warning

  - name: use_if_exists_for_drops
    type: pattern
    regex: "(?i)DROP\\s+(?!.*IF\\s+EXISTS)"
    message: "DROP statements should use IF EXISTS clause for idempotency"
    severity: info
    suggestion: "Use DROP TABLE IF EXISTS or DROP INDEX IF EXISTS"
