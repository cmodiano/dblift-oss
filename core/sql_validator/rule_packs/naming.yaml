# =============================================================================
# DBLift Naming Conventions Rule Pack
# 
# Rules for enforcing consistent naming conventions across database objects.
# These rules help maintain code readability and prevent naming conflicts.
# =============================================================================

rules:
  # ---------------------------------------------------------------------------
  # Table Naming Conventions
  # ---------------------------------------------------------------------------

  - name: table_name_snake_case
    type: naming
    target: table
    pattern: "^[a-z][a-z0-9_]*$"
    message: "Table names should use lowercase snake_case"
    severity: warning

  - name: table_name_no_reserved_words
    type: pattern
    regex: "(?i)CREATE\\s+TABLE\\s+(user|order|group|table|index|view|select|insert|update|delete|drop|alter|create|database|schema)"
    message: "Table names should not use SQL reserved words"
    severity: error
    suggestion: "Use descriptive names that don't conflict with SQL keywords"

  - name: table_name_descriptive
    type: pattern
    regex: "(?i)CREATE\\s+TABLE\\s+(tbl|tmp|temp|test|data|info|stuff)"
    message: "Table names should be descriptive, avoid generic prefixes like tbl_, tmp_, test_"
    severity: info
    suggestion: "Use meaningful names that describe the table's purpose"

  # ---------------------------------------------------------------------------
  # Column Naming Conventions
  # ---------------------------------------------------------------------------

  - name: column_name_snake_case
    type: naming
    target: column
    pattern: "^[a-z][a-z0-9_]*$"
    message: "Column names should use lowercase snake_case"
    severity: warning

  - name: id_column_naming
    type: naming
    target: column
    pattern: "^(id|[a-z]+_id)$"
    message: "ID columns should be named 'id' or '{table}_id'"
    severity: info

  - name: timestamp_columns_naming
    type: naming
    target: column
    pattern: ".*_(at|date|time|timestamp)$"
    message: "Timestamp columns should end with _at, _date, _time, or _timestamp"
    severity: info

  - name: boolean_columns_naming
    type: naming
    target: column
    pattern: "^(is_|has_|can_|should_|will_)[a-z][a-z0-9_]*$"
    message: "Boolean columns should start with is_, has_, can_, should_, or will_"
    severity: info

  - name: fk_column_naming_convention
    type: naming
    target: column
    pattern: ".*_id$"
    message: "Foreign key columns should end with _id"
    severity: info

  # ---------------------------------------------------------------------------
  # Index Naming Conventions
  # ---------------------------------------------------------------------------

  - name: index_name_prefix
    type: naming
    target: index
    pattern: "^(idx_|ix_|pk_|uk_|fk_)[a-z][a-z0-9_]*$"
    message: "Index names should have descriptive prefix (idx_, ix_, pk_, uk_, fk_)"
    severity: info

  - name: index_name_descriptive
    type: pattern
    regex: "(?i)CREATE\\s+(?:UNIQUE\\s+)?INDEX\\s+(idx|ix|index|ind)\\d+"
    message: "Index names should be descriptive, avoid generic names like idx1, ix2"
    severity: warning
    suggestion: "Use descriptive names: idx_users_email, pk_orders_id, etc."

  # ---------------------------------------------------------------------------
  # Constraint Naming Conventions
  # ---------------------------------------------------------------------------

  - name: constraint_name_descriptive
    type: naming
    target: constraint
    pattern: "^(pk_|fk_|uk_|ck_|df_)[a-z][a-z0-9_]*$"
    message: "Constraint names should be descriptive with prefix (pk_, fk_, uk_, ck_, df_)"
    severity: info

  - name: primary_key_naming
    type: pattern
    regex: "(?i)PRIMARY\\s+KEY.*(?!pk_|primary_key_)"
    message: "Primary key constraints should be named with pk_ prefix"
    severity: info
    suggestion: "Use: CONSTRAINT pk_table_name PRIMARY KEY"

  - name: foreign_key_naming
    type: pattern
    regex: "(?i)FOREIGN\\s+KEY.*(?!fk_|foreign_key_)"
    message: "Foreign key constraints should be named with fk_ prefix"
    severity: info
    suggestion: "Use: CONSTRAINT fk_table_column FOREIGN KEY"

  # ---------------------------------------------------------------------------
  # View Naming Conventions
  # ---------------------------------------------------------------------------

  - name: view_name_snake_case
    type: pattern
    regex: "(?i)CREATE\\s+(?:OR\\s+REPLACE\\s+)?VIEW\\s+([A-Z][a-zA-Z0-9_]*)"
    message: "View names should use lowercase snake_case"
    severity: warning

  - name: view_name_prefix
    type: pattern
    regex: "(?i)CREATE\\s+(?:OR\\s+REPLACE\\s+)?VIEW\\s+(v_|vw_|view_)"
    message: "View names may optionally use v_ or vw_ prefix for clarity"
    severity: info

  # ---------------------------------------------------------------------------
  # Procedure/Function Naming Conventions
  # ---------------------------------------------------------------------------

  - name: procedure_name_snake_case
    type: pattern
    regex: "(?i)CREATE\\s+(?:OR\\s+REPLACE\\s+)?(PROCEDURE|PROC|FUNCTION).*\\s+([A-Z][a-zA-Z0-9_]*)"
    message: "Procedure and function names should use lowercase snake_case"
    severity: warning

  - name: procedure_name_prefix
    type: pattern
    regex: "(?i)CREATE\\s+(?:OR\\s+REPLACE\\s+)?(PROCEDURE|PROC).*\\s+(sp_|proc_)"
    message: "Stored procedures may optionally use sp_ or proc_ prefix"
    severity: info

  - name: function_name_prefix
    type: pattern
    regex: "(?i)CREATE\\s+(?:OR\\s+REPLACE\\s+)?FUNCTION.*\\s+(fn_|func_)"
    message: "Functions may optionally use fn_ or func_ prefix"
    severity: info

  # ---------------------------------------------------------------------------
  # Sequence Naming Conventions
  # ---------------------------------------------------------------------------

  - name: sequence_name_snake_case
    type: pattern
    regex: "(?i)CREATE\\s+SEQUENCE\\s+([A-Z][a-zA-Z0-9_]*)"
    message: "Sequence names should use lowercase snake_case"
    severity: warning

  - name: sequence_name_suffix
    type: pattern
    regex: "(?i)CREATE\\s+SEQUENCE\\s+\\w+(?!_seq|_sequence)"
    message: "Sequence names should end with _seq or _sequence for clarity"
    severity: info
    suggestion: "Use: CREATE SEQUENCE users_id_seq"

  # ---------------------------------------------------------------------------
  # Trigger Naming Conventions
  # ---------------------------------------------------------------------------

  - name: trigger_name_snake_case
    type: pattern
    regex: "(?i)CREATE\\s+(?:OR\\s+REPLACE\\s+)?TRIGGER\\s+([A-Z][a-zA-Z0-9_]*)"
    message: "Trigger names should use lowercase snake_case"
    severity: warning

  - name: trigger_name_prefix
    type: pattern
    regex: "(?i)CREATE\\s+(?:OR\\s+REPLACE\\s+)?TRIGGER\\s+(trg_|trigger_)"
    message: "Trigger names may optionally use trg_ or trigger_ prefix"
    severity: info

  # ---------------------------------------------------------------------------
  # Schema Naming Conventions
  # ---------------------------------------------------------------------------

  - name: schema_name_snake_case
    type: pattern
    regex: "(?i)CREATE\\s+SCHEMA\\s+([A-Z][a-zA-Z0-9_]*)"
    message: "Schema names should use lowercase snake_case"
    severity: warning

  - name: schema_name_no_special_chars
    type: pattern
    regex: "(?i)CREATE\\s+SCHEMA\\s+[^a-z0-9_]"
    message: "Schema names should only contain lowercase letters, numbers, and underscores"
    severity: error
