# =============================================================================
# DBLift Performance Optimization Rule Pack
# 
# Rules focused on query performance, index optimization, and preventing
# common performance anti-patterns in SQL migrations and queries.
# =============================================================================

rules:
  # ---------------------------------------------------------------------------
  # Index Best Practices
  # ---------------------------------------------------------------------------

  - name: fk_must_have_index
    type: relational
    target: foreign_key
    requires_index: true
    message: "Foreign keys must have indexes for join performance"
    severity: error

  - name: unique_constraint_should_have_index
    type: pattern
    regex: "(?i)UNIQUE.*(?!INDEX|KEY)"
    message: "UNIQUE constraints should have corresponding indexes"
    severity: warning

  - name: frequently_queried_columns_should_have_index
    type: pattern
    regex: "(?i)(status|type|state|created_at|updated_at).*(VARCHAR|INTEGER|TIMESTAMP)(?!.*INDEX)"
    message: "Frequently queried columns (status, type, created_at) should have indexes"
    severity: info
    suggestion: "Consider adding index: CREATE INDEX idx_table_status ON table(status)"

  # ---------------------------------------------------------------------------
  # Query Anti-Patterns
  # ---------------------------------------------------------------------------

  - name: no_select_star
    type: pattern
    regex: "SELECT\\s+\\*"
    message: "SELECT * retrieves unnecessary columns and can cause performance issues"
    severity: warning
    exceptions:
      - when: "COUNT(*)"
        policy_exempt: true
        owner: "dblift-rule-pack"
        reason: "Aggregate count expressions do not expand table columns."
      - in_views: true
        policy_exempt: true
        owner: "dblift-rule-pack"
        reason: "View definitions may intentionally expose all projected columns for compatibility."
    suggestion: "List specific columns: SELECT id, name, email FROM users"
    rationale: "SELECT * makes query behavior fragile when schemas evolve and can increase I/O unexpectedly."
    remediation: "Select only the columns required by the migration or validation query."
    control_mapping:
      - "DBLIFT-PERF-001"
    override_policy:
      requires:
        - owner
        - reason
      max_days: 90

  - name: no_cartesian_join
    type: pattern
    regex: "(?i)FROM\\s+\\w+\\s*,\\s*\\w+(?!.*WHERE|.*ON)"
    message: "Cartesian joins (comma-separated FROM) without WHERE/ON clause cause performance issues"
    severity: error
    suggestion: "Use explicit JOIN with ON clause: FROM table1 JOIN table2 ON table1.id = table2.id"

  - name: no_implicit_join_without_condition
    type: pattern
    regex: "(?i)FROM\\s+\\w+\\s+\\w+.*WHERE\\s+\\w+\\.\\w+\\s*=\\s*\\w+\\.\\w+"
    message: "Use explicit JOIN syntax instead of implicit joins in WHERE clause"
    severity: info
    suggestion: "Use JOIN: FROM table1 JOIN table2 ON table1.id = table2.id"

  - name: update_delete_must_have_where
    type: pattern
    target: update
    require: "WHERE"
    message: "UPDATE/DELETE without WHERE clause affects entire table - performance risk"
    severity: error

  # ---------------------------------------------------------------------------
  # Subquery Optimization
  # ---------------------------------------------------------------------------

  - name: avoid_correlated_subquery
    type: pattern
    regex: "(?i)WHERE\\s+EXISTS\\s*\\(\\s*SELECT.*\\w+\\.\\w+.*\\w+\\.\\w+"
    message: "Correlated subqueries can be slow - consider using JOIN or window functions"
    severity: warning
    suggestion: "Rewrite using JOIN: SELECT DISTINCT ... FROM t1 JOIN t2 ON t1.id = t2.id"

  - name: prefer_exists_over_in_for_subqueries
    type: pattern
    regex: "(?i)WHERE\\s+\\w+\\s+IN\\s*\\(\\s*SELECT"
    message: "Consider using EXISTS instead of IN for subqueries - often more efficient"
    severity: info
    suggestion: "Use EXISTS: WHERE EXISTS (SELECT 1 FROM table2 WHERE table2.id = table1.id)"

  - name: avoid_not_in_with_nullable_subquery
    type: pattern
    regex: "(?i)WHERE\\s+\\w+\\s+NOT\\s+IN\\s*\\(\\s*SELECT.*(?!NOT\\s+NULL)"
    message: "NOT IN with nullable subquery returns no rows - use NOT EXISTS instead"
    severity: error
    suggestion: "Use NOT EXISTS: WHERE NOT EXISTS (SELECT 1 FROM table2 WHERE table2.id = table1.id)"

  # ---------------------------------------------------------------------------
  # Function Usage in WHERE Clauses
  # ---------------------------------------------------------------------------

  - name: no_function_on_indexed_column_in_where
    type: pattern
    regex: "(?i)WHERE\\s+(UPPER|LOWER|TRIM|SUBSTRING|DATE|YEAR|MONTH)\\(\\w+\\).*="
    message: "Functions on indexed columns in WHERE clause prevent index usage"
    severity: warning
    suggestion: "Use function-based index or compare without function: WHERE LOWER(email) = LOWER(?)"

  - name: no_like_with_leading_wildcard
    type: pattern
    regex: "(?i)WHERE\\s+\\w+\\s+LIKE\\s+['\"]%"
    message: "LIKE with leading wildcard (%text) prevents index usage"
    severity: warning
    suggestion: "Use full-text search or consider LIKE 'text%' if possible"

  - name: no_regex_in_where_clause
    type: pattern
    regex: "(?i)WHERE\\s+.*(SIMILAR\\s+TO|~|~\\*|!~)"
    message: "Regular expressions in WHERE clause prevent index usage"
    severity: info
    suggestion: "Consider full-text search or pre-filtering strategies"

  # ---------------------------------------------------------------------------
  # Join Optimization
  # ---------------------------------------------------------------------------

  - name: prefer_inner_join_over_where
    type: pattern
    regex: "(?i)FROM\\s+\\w+.*WHERE\\s+\\w+\\.\\w+\\s*=\\s*\\w+\\.\\w+"
    message: "Use explicit JOIN syntax instead of implicit joins in WHERE clause"
    severity: info

  - name: join_order_matters
    type: pattern
    regex: "(?i)FROM\\s+(\\w+)\\s+JOIN\\s+(\\w+)\\s+JOIN\\s+(\\w+)"
    message: "Join order can affect performance - smaller tables first, filtered tables first"
    severity: info

  - name: avoid_cross_join
    type: pattern
    regex: "(?i)CROSS\\s+JOIN"
    message: "CROSS JOIN creates Cartesian product - usually unintended and very slow"
    severity: error
    suggestion: "Use INNER JOIN with explicit ON condition"

  # ---------------------------------------------------------------------------
  # Aggregation and Grouping
  # ---------------------------------------------------------------------------

  - name: group_by_should_match_select
    type: pattern
    regex: "(?i)SELECT\\s+.*GROUP\\s+BY(?!.*SELECT.*GROUP\\s+BY)"
    message: "GROUP BY columns should match non-aggregated SELECT columns"
    severity: error

  - name: prefer_count_over_count_star_when_possible
    type: pattern
    regex: "(?i)COUNT\\(\\*\\)(?!.*WHERE|.*JOIN)"
    message: "COUNT(*) is fine, but COUNT(column) can be faster with index on column"
    severity: info

  - name: avoid_distinct_when_not_needed
    type: pattern
    regex: "(?i)SELECT\\s+DISTINCT.*FROM\\s+\\w+\\s+WHERE\\s+\\w+\\.\\w+\\s*=\\s*\\w+\\.\\w+"
    message: "DISTINCT may be unnecessary if JOIN already ensures uniqueness"
    severity: info

  # ---------------------------------------------------------------------------
  # Large Result Sets
  # ---------------------------------------------------------------------------

  - name: require_limit_on_large_queries
    type: pattern
    regex: "(?i)SELECT.*FROM\\s+(logs|events|audit|history|transactions)(?!.*LIMIT|.*TOP|.*FETCH)"
    message: "Queries on large tables should use LIMIT/TOP/FETCH to prevent performance issues"
    severity: warning
    exceptions:
      - when: "COUNT(*)"
      - when: "EXISTS"
      - in_views: true

  - name: no_order_by_without_limit
    type: pattern
    regex: "(?i)ORDER\\s+BY.*(?!LIMIT|TOP|FETCH)"
    message: "ORDER BY without LIMIT can be expensive - consider adding LIMIT"
    severity: info
    exceptions:
      - when: "COUNT(*)"
      - when: "EXISTS"
      - in_views: true

  # ---------------------------------------------------------------------------
  # Data Type Performance
  # ---------------------------------------------------------------------------

  - name: use_proper_index_types
    type: pattern
    regex: "(?i)CREATE\\s+INDEX.*ON\\s+\\w+\\(.*(TEXT|CLOB|BLOB)"
    message: "Indexes on TEXT/CLOB/BLOB columns may not be efficient - consider full-text indexes"
    severity: warning
    suggestion: "Use full-text search indexes for large text columns"

  - name: avoid_overly_wide_varchar
    type: pattern
    regex: "(?i)VARCHAR\\(\\d{4,}\\)|VARCHAR\\(MAX\\)"
    message: "Very wide VARCHAR columns can impact index performance - use appropriate size"
    severity: info
    suggestion: "Use VARCHAR with appropriate length based on actual data needs"

  # ---------------------------------------------------------------------------
  # Transaction Performance
  # ---------------------------------------------------------------------------

  - name: avoid_long_running_transactions
    type: pattern
    regex: "(?i)(BEGIN|START).*(SELECT|UPDATE|INSERT).*(SELECT|UPDATE|INSERT).*(SELECT|UPDATE|INSERT)"
    message: "Long transactions with multiple operations can cause lock contention"
    severity: info
    suggestion: "Break into smaller transactions or use batch operations"

  - name: prefer_batch_operations
    type: pattern
    regex: "(?i)(INSERT|UPDATE).*VALUES.*VALUES.*VALUES"
    message: "Multiple single-row INSERTs - consider batch INSERT or bulk operations"
    severity: info
    suggestion: "Use batch INSERT: INSERT INTO table VALUES (...), (...), (...)"

  # ---------------------------------------------------------------------------
  # View Performance
  # ---------------------------------------------------------------------------

  - name: materialized_view_for_complex_views
    type: pattern
    regex: "(?i)CREATE\\s+(?!MATERIALIZED)\\s+VIEW.*(JOIN|GROUP\\s+BY|UNION)"
    message: "Complex views with JOINs/aggregations may benefit from materialized views"
    severity: info
    suggestion: "Consider CREATE MATERIALIZED VIEW for better query performance"

  - name: avoid_nested_views
    type: pattern
    regex: "(?i)CREATE\\s+VIEW.*SELECT.*FROM.*\\(.*SELECT.*FROM.*VIEW"
    message: "Nested views can impact performance - consider flattening"
    severity: info
