# https://pre-commit.com
#
# Setup (repo root, dev env installed):
#   pip install -r requirements-dev.txt
#   pre-commit install
#
# Run the same gate as CI locally:
#   pre-commit run check-code-quality --all-files

default_language_version:
  python: python3

repos:
  - repo: local
    hooks:
      - id: check-code-quality
        name: check code quality (black, isort, flake8, mypy)
        entry: bash scripts/run_code_quality_hook.sh
        language: system
        pass_filenames: false
        files: ^(api|cli|config|core|db|tests|scripts)/.*\.py$|^pyproject\.toml$|^\.flake8$|^scripts/check_code_quality\.sh$|^scripts/run_code_quality_hook\.sh$
