name: Code Quality

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e ".[dev]"

      - name: Check formatting
        run: black --check --diff api/ cli/ config/ core/ db/ tests/ scripts/

      - name: Check imports
        run: isort --check --diff api/ cli/ config/ core/ db/ tests/ scripts/

      - name: Check public OSS surface
        run: python -m pytest tests/unit/test_oss_public_surface.py tests/smoke/test_oss_standalone.py -q
