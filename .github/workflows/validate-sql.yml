name: SQL Validation

# Template workflow — copy this to your own repository and adapt it.
# Triggered manually; integrate into pull_request or push as needed.

on:
  workflow_dispatch:

jobs:
  validate-sql:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dblift
        run: |
          python -m pip install --upgrade pip
          python -m pip install "dblift[postgresql]"

      - name: Validate SQL migrations
        run: |
          dblift validate-sql migrations/ \
            --dialect postgresql \
            --rules-file .dblift_rules.yaml \
            --format github-actions \
            --fail-on error

      - name: Export SARIF results (for Code Scanning)
        if: always()
        run: |
          dblift validate-sql migrations/ \
            --dialect postgresql \
            --rules-file .dblift_rules.yaml \
            --format sarif \
            --fail-on never \
            > validation-results.sarif

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sql-validation-sarif
          path: validation-results.sarif

      - name: Comment PR with validation results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v9
        with:
          script: |
            const { execSync } = require('child_process');

            // Use --fail-on never so execSync doesn't throw when findings exist.
            const output = execSync(
              'dblift validate-sql migrations/ --dialect postgresql --rules-file .dblift_rules.yaml --format json --fail-on never',
              { encoding: 'utf-8' }
            );
            const results = JSON.parse(output);

            let comment = '## SQL Validation Failed\n\n';
            comment += `**Files checked:** ${results.checked_count}\n`;
            comment += `**Findings:** ${results.findings.length}\n`;
            comment += `- Errors: ${results.summary.error}\n`;
            comment += `- Warnings: ${results.summary.warning}\n`;
            comment += `- Info: ${results.summary.info}\n\n`;
            comment += 'See the Actions tab for full details.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
