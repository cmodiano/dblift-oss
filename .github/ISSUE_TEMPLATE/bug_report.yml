name: Bug report
description: Something is broken — a CLI command, a migration, a parse, an API call.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The fields below are the
        minimum needed to reproduce; the more concrete you can be, the
        faster we can fix it.

  - type: checkboxes
    id: prechecks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched [existing issues](https://github.com/cmodiano/dblift/issues?q=is%3Aissue) and this isn't a duplicate.
          required: true
        - label: I'm running on the latest `develop` (or the latest tagged release).
          required: true
        - label: This is a bug, not a usage question (those go to the [docs](https://github.com/cmodiano/dblift/tree/develop/docs)).
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence — what broke?
      placeholder: "`dblift migrate --dry-run` writes to stdout when it should write to stderr."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: |
        Minimum steps. Include the exact command you ran, the SQL/config
        involved, and any environment variables that matter
        (`DBLIFT_*`). Snippets > prose.
      render: bash
      placeholder: |
        # 1. config
        cat dblift.yaml

        # 2. command
        dblift migrate --dry-run --target-version 2.0.0
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include the full error / stack trace if any.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: dialect
    attributes:
      label: Database dialect
      multiple: true
      options:
        - PostgreSQL
        - MySQL
        - Oracle
        - SQL Server
        - DB2
        - SQLite
        - CosmosDB
        - "N/A (CLI/parser-only bug)"
    validations:
      required: true

  - type: input
    id: dblift_version
    attributes:
      label: dblift version
      description: Output of `dblift --version`, or commit SHA if running from source.
      placeholder: "v1.3.7 / 8f8f591"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: "Ubuntu 22.04 x86_64 / macOS 14.5 arm64"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        If the bug is in a CLI command, re-run with `--log-level DEBUG`
        and paste the relevant section. Trim secrets — connection strings,
        passwords, license keys.
      render: shell
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Workarounds you tried, related PRs, hypotheses about the cause.
    validations:
      required: false
